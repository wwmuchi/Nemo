<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nemo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300..700&family=Geist:wght@100..900&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg:        transparent;
    --surface:   rgba(255, 255, 255, 0.06);
    --surface-2: rgba(255, 255, 255, 0.10);
    --border:    rgba(255, 255, 255, 0.18);
    --border-2:  rgba(255, 255, 255, 0.32);
    --ink:       #ffffff;
    --ink-2:     rgba(255, 255, 255, 0.88);
    --ink-3:     rgba(255, 255, 255, 0.68);
    --ink-4:     rgba(255, 255, 255, 0.48);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background:
      linear-gradient(rgba(5, 22, 45, 0.45), rgba(5, 22, 45, 0.78)),
      url('/images/underwater_bg.jpg') center center / cover no-repeat fixed,
      #051f3d;
    color: var(--ink);
    font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    letter-spacing: -0.005em;
  }

  button { font-family: inherit; cursor: pointer; }
  input  { font-family: inherit; }

  /* Homebar (shared across pages — keep identical across probe/compass/scores) */
  .homebar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 49px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    line-height: 1.5;
  }
  .homebar-brand {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .homebar-brand .dot { color: var(--ink-4); }
  .homebar-nav { display: flex; gap: 4px; }
  .homebar-nav a {
    color: var(--ink-3);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 7px;
    transition: all 0.12s;
  }
  .homebar-nav a:hover { color: var(--ink); background: var(--surface-2); }
  .homebar-nav a.active {
    color: var(--ink);
    background: var(--surface-2);
    font-weight: 500;
  }

  /* ============ MAIN LAYOUT ============ */
  .grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 50px);
  }

  .col {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    background: var(--surface);
  }
  .col + .col {
    border-left: 1px solid var(--border);
    background: var(--bg);
  }

  /* ============ LEFT: PANEL ============ */
  .panel-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 18px 0 24px;
    position: relative;
  }
  .panel-wrap::-webkit-scrollbar { width: 8px; }
  .panel-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 4px; }
  .panel-wrap::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }

  /* Thinker cards */
  .thinker-list { padding: 6px 6px 0; }

  .thinker-row {
    padding: 14px 16px;
    border-radius: 8px;
    position: relative;
    animation: rowIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
  }
  .thinker-row:hover { background: var(--surface-2); }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }
  .thinker-row-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .thinker-name {
    font-size: 14px;
    font-weight: 550;
    color: var(--ink);
    letter-spacing: -0.005em;
    line-height: 1.25;
  }
  .thinker-era {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    color: var(--ink-4);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }
  .thinker-score {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }
  .score-num {
    font-family: "Geist", sans-serif;
    font-feature-settings: "tnum";
    font-weight: 500;
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.03em;
    min-width: 32px;
  }
  .score-num.pending { color: var(--ink-4); font-weight: 300; }
  .score-num .denom {
    font-size: 12px;
    color: var(--ink-4);
    font-weight: 400;
    margin-left: 1px;
  }
  .score-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .score-fill {
    position: absolute;
    inset: 0 100% 0 0;
    background: var(--ink);
    border-radius: 2px;
    transition: right 1.1s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .score-tag {
    font-family: "Geist Mono", monospace;
    font-size: 9.5px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    min-width: 60px;
    text-align: right;
  }

  /* ============ RIGHT COLUMN ============ */
  .right-col {
    background: var(--bg);
    position: relative;
  }
  .right-body {
    flex: 1;
    overflow: hidden;
    position: relative;
    min-height: 0;
  }
  .state {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    transition: opacity 0.28s ease, transform 0.32s ease;
  }
  .state::-webkit-scrollbar { width: 8px; }
  .state::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 4px; }

  .state.hidden {
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
  }

  /* ============ COMPOSE STATE ============ */
  .compose-inner {
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  /* Middle section (question dropdown) */
  .middle-section {
    flex: 1;
    overflow-y: auto;
    padding: 40px 28px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .middle-section::-webkit-scrollbar { width: 8px; }
  .middle-section::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 4px; }

  .middle-inner {
    width: 100%;
    max-width: 720px;
  }
  #resultPane { margin-top: 36px; }

  .q-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin-bottom: 10px;
  }

  /* Top bar (model select) */
  .top-bar {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 28px;
    flex-shrink: 0;
  }
  .top-bar-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  .top-bar .model-select { width: 100%; }

  /* Question dropdown trigger */
  .q-trigger {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: left;
    font-size: 13.5px;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.12s;
    font-weight: 450;
  }
  .q-trigger:hover { border-color: var(--ink-3); }
  .q-trigger.open { border-color: var(--ink); }
  .q-trigger .placeholder { color: var(--ink-4); }
  .q-trigger .label-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .q-trigger .label-num {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    margin-right: 8px;
    letter-spacing: 0.04em;
  }
  .q-trigger .chev {
    color: var(--ink-3);
    flex-shrink: 0;
    transition: transform 0.18s ease;
  }
  .q-trigger.open .chev { transform: rotate(180deg); }

  .q-trigger-wrap {
    position: relative;
  }

  /* Question popover */
  .q-popover {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: #0a2244;
    border: 1px solid var(--border-2);
    border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45), 0 4px 12px rgba(0,0,0,0.25);
    z-index: 60;
    display: none;
    max-height: 380px;
    overflow-y: auto;
    animation: popIn 0.14s ease;
  }
  .q-popover.open { display: block; }
  .q-popover::-webkit-scrollbar { width: 6px; }
  .q-popover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

  .q-list {
    /* used inside the popover */
  }
  .q-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    cursor: pointer;
    transition: background 0.08s;
    border-top: 1px solid var(--border);
  }
  .q-row:first-child { border-top: none; }
  .q-row:hover { background: var(--surface-2); }
  .q-row.selected { background: rgba(255, 255, 255, 0.12); }
  .q-radio {
    width: 14px; height: 14px;
    border: 1.25px solid var(--ink-4);
    border-radius: 50%;
    margin-top: 3px;
    flex-shrink: 0;
    position: relative;
    transition: all 0.12s;
    background: var(--surface);
  }
  .q-row.selected .q-radio { border-color: var(--ink); }
  .q-row.selected .q-radio::after {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--ink);
  }
  .q-num {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    padding-top: 3px;
    letter-spacing: 0.02em;
    min-width: 20px;
  }
  .q-row.selected .q-num { color: var(--ink); }
  .q-text {
    flex: 1;
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.45;
  }
  .q-source {
    font-family: "Geist Mono", monospace;
    font-size: 9.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 3px;
    display: inline-block;
  }

  .model-select {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }
  .model-opt {
    background: transparent;
    border: none;
    padding: 9px 4px;
    font-size: 13px;
    color: var(--ink-2);
    font-weight: 450;
    border-radius: 7px;
    transition: all 0.12s;
    letter-spacing: -0.005em;
  }
  .model-opt:hover { color: var(--ink); background: var(--surface-2); }
  .model-opt.active {
    background: #062a4a;
    color: #fff;
    font-weight: 500;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset;
  }
  .model-opt.active:hover { background: #062a4a; }

  /* ============ RESULT BLOCKS ============ */
  .result-block { margin-bottom: 32px; }
  .result-block:last-child { margin-bottom: 0; }
  .result-block-title {
    font-family: "Geist Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-4);
    font-weight: 500;
    margin: 0 0 12px 0;
  }
  .result-block-body {
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink-2);
    max-width: 64ch;
  }
  .result-block-body p + p { margin-top: 1em; }
  .result-block-body em { color: var(--ink); font-style: italic; }
  .result-block-body strong { color: var(--ink); font-weight: 500; }

  /* Loading */
  .loading {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--ink-3);
    font-size: 13px;
  }
  .loading .ld-dot {
    width: 5px; height: 5px;
    background: var(--ink-3);
    border-radius: 50%;
    animation: ldBounce 1.2s infinite ease-in-out;
  }
  .loading .ld-dot:nth-child(2) { animation-delay: 0.15s; }
  .loading .ld-dot:nth-child(3) { animation-delay: 0.30s; }
  @keyframes ldBounce {
    0%, 70%, 100% { transform: scale(0.65); opacity: 0.4; }
    35% { transform: scale(1); opacity: 1; }
  }

  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<nav class="homebar">
  <div class="homebar-brand">Finding Nemo</div>
  <div class="homebar-nav">
    <a href="/" class="active">Probe</a>
    <a href="/compass/">Compass</a>
    <a href="/scores/">Scores</a>
  </div>
</nav>

<main class="grid">

  <!-- LEFT: thinkers panel -->
  <section class="col">
    <div class="panel-wrap">
      <div class="thinker-list" id="thinkerList"></div>
    </div>
  </section>

  <!-- RIGHT: compose / result -->
  <section class="col right-col">
    <div class="right-body">

      <div class="state">
        <div class="compose-inner">
          <div class="top-bar">
            <div class="top-bar-inner">
              <div class="model-select" id="modelSelect">
                <button class="model-opt active" data-model="Claude">Claude</button>
                <button class="model-opt" data-model="ChatGPT">ChatGPT</button>
                <button class="model-opt" data-model="Gemini">Gemini</button>
                <button class="model-opt" data-model="Grok">Grok</button>
              </div>
            </div>
          </div>
          <div class="middle-section">
            <div class="middle-inner">
              <h3 class="q-title">Question</h3>
              <div class="q-trigger-wrap">
                <button class="q-trigger" id="qTrigger">
                  <span class="label-text"><span class="placeholder">Select a question</span></span>
                  <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="q-popover" id="qPopover">
                  <div class="q-list" id="qList"></div>
                </div>
              </div>
              <div id="resultPane" hidden>
                <section class="result-block">
                  <h2 class="result-block-title" id="promptBlockTitle">What we asked Claude</h2>
                  <div class="result-block-body" id="promptBody"></div>
                </section>
                <section class="result-block">
                  <h2 class="result-block-title" id="responseBlockTitle">Claude's response</h2>
                  <div class="result-block-body" id="resultBody"></div>
                </section>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>
</main>

<script>
  // ============ DATA (loaded from /api/* — see initFromServer below) ============
  let THINKERS = [];
  let QUESTIONS = [];

  // ============ STATE ============
  const state = {
    selectedQuestion: null,
    selectedModel: 'Claude',
    lastScores: {},
  };

  const getQuestion = id => QUESTIONS.find(q => q.id === id);

  // ============ LEFT: PANEL ============
  function renderThinkers() {
    const list = document.getElementById('thinkerList');
    list.innerHTML = THINKERS.map((t, i) => {
      const raw = state.lastScores[t.id];
      const has = raw !== null && raw !== undefined;
      const s = has ? raw : 0;
      const pct = has ? s * 10 : 0;
      return `
        <div class="thinker-row" style="animation-delay:${i * 0.04}s">
          <div class="thinker-row-top">
            <div>
              <div class="thinker-name">${t.name}</div>
              <div class="thinker-era">${t.era}</div>
            </div>
          </div>
          <div class="thinker-score">
            <div class="score-num ${has ? '' : 'pending'}" data-score-for="${t.id}">
              ${has ? s : '—'}<span class="denom">/10</span>
            </div>
            <div class="score-track">
              <div class="score-fill" data-fill-for="${t.id}" style="right:${100 - pct}%"></div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeQPopover();
  });

  // ============ COMPOSE: QUESTIONS ============
  function renderQuestions() {
    const list = document.getElementById('qList');
    list.innerHTML = QUESTIONS.map(q => `
      <div class="q-row ${state.selectedQuestion === q.id ? 'selected' : ''}" data-qid="${q.id}">
        <div class="q-radio"></div>
        <div class="q-num">${String(q.id).padStart(2, '0')}</div>
        <div>
          <div class="q-text">${q.text}</div>
          <span class="q-source">${q.source}</span>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('.q-row').forEach(el => {
      el.addEventListener('click', () => {
        state.selectedQuestion = Number(el.dataset.qid);
        renderQuestions();
        updateQTrigger();
        closeQPopover();
        loadResponse();
      });
    });
  }

  function updateQTrigger() {
    const trigger = document.getElementById('qTrigger');
    const label = trigger.querySelector('.label-text');
    if (state.selectedQuestion === null) {
      label.innerHTML = `<span class="placeholder">Select a question</span>`;
    } else {
      const q = getQuestion(state.selectedQuestion);
      label.innerHTML = `<span class="label-num">${String(q.id).padStart(2,'0')}</span>${q.text}`;
    }
  }

  function openQPopover() {
    document.getElementById('qPopover').classList.add('open');
    document.getElementById('qTrigger').classList.add('open');
  }
  function closeQPopover() {
    document.getElementById('qPopover').classList.remove('open');
    document.getElementById('qTrigger').classList.remove('open');
  }
  document.getElementById('qTrigger').addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = document.getElementById('qPopover').classList.contains('open');
    if (isOpen) closeQPopover(); else openQPopover();
  });
  document.addEventListener('click', e => {
    const pop = document.getElementById('qPopover');
    if (!pop.classList.contains('open')) return;
    if (!pop.contains(e.target) && !document.getElementById('qTrigger').contains(e.target)) {
      closeQPopover();
    }
  });

  document.getElementById('modelSelect').addEventListener('click', e => {
    const btn = e.target.closest('.model-opt');
    if (!btn) return;
    document.querySelectorAll('#modelSelect .model-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.selectedModel = btn.dataset.model;
    if (state.selectedQuestion !== null) loadResponse();
  });

  // ============ RESPONSE (instant CSV lookup) ============
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderResponse(text) {
    return text
      .split(/\n\n+/)
      .map(p => `<p>${escapeHtml(p.trim()).replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  function applyProbeResponse(data, model) {
    document.getElementById('promptBlockTitle').textContent = `What we asked ${model}`;
    document.getElementById('responseBlockTitle').textContent = `${model}'s response`;
    document.getElementById('promptBody').innerHTML = renderResponse(data.prompt_given || '');
    document.getElementById('resultBody').innerHTML = renderResponse(data.response || '');
    state.lastScores = data.scores || {};
    renderThinkers();
    animateScores(state.lastScores);
  }

  async function loadResponse() {
    if (state.selectedQuestion === null) return;
    const q = getQuestion(state.selectedQuestion);
    const model = state.selectedModel;
    const modelId = model.toLowerCase();

    const pane = document.getElementById('resultPane');
    pane.hidden = false;
    document.getElementById('promptBlockTitle').textContent = `What we asked ${model}`;
    document.getElementById('responseBlockTitle').textContent = `${model}'s response`;
    document.getElementById('promptBody').innerHTML = '';
    document.getElementById('resultBody').innerHTML = `
      <div class="loading">
        <span class="ld-dot"></span><span class="ld-dot"></span><span class="ld-dot"></span>
        <span style="margin-left:6px">loading recorded response</span>
      </div>`;
    state.lastScores = {};
    renderThinkers();

    try {
      const res = await fetch(`/api/probe_response?question_id=${encodeURIComponent(q.id)}&model=${encodeURIComponent(modelId)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `request failed (${res.status})`);
      applyProbeResponse(data, model);
    } catch (err) {
      document.getElementById('resultBody').innerHTML =
        `<p style="color:#a8331f">Error: ${escapeHtml(err.message)}</p>`;
    }
  }

  function animateScores(scores) {
    Object.entries(scores).forEach(([id, target], idx) => {
      if (target === null || target === undefined) return;
      const el = document.querySelector(`[data-score-for="${id}"]`);
      if (!el) return;
      const delay = idx * 80;
      let cur = 0;
      setTimeout(() => {
        const t = setInterval(() => {
          cur += 1;
          el.innerHTML = `${cur}<span class="denom">/10</span>`;
          if (cur >= target) clearInterval(t);
        }, 55);
      }, delay);
    });
  }

  // ============ INIT ============
  async function initFromServer() {
    const [thinkers, questions] = await Promise.all([
      fetch('/api/thinkers').then(r => r.json()),
      fetch('/api/questions').then(r => r.json()),
    ]);
    THINKERS = thinkers;
    QUESTIONS = questions;
    renderThinkers();
    renderQuestions();
  }
  initFromServer().catch(err => {
    console.error('Failed to load site data:', err);
    document.body.innerHTML = `<pre style="padding:24px;color:#a8331f">Failed to load data: ${err.message}</pre>`;
  });
</script>
</body>
</html>
