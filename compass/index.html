<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nemo · compass</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300..700&family=Geist:wght@100..900&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg:        transparent;
    --surface:   rgba(255, 255, 255, 0.06);
    --surface-2: rgba(255, 255, 255, 0.10);
    --border:    rgba(255, 255, 255, 0.18);
    --border-2:  rgba(255, 255, 255, 0.32);
    --ink:       #ffffff;
    --ink-2:     rgba(255, 255, 255, 0.88);
    --ink-3:     rgba(255, 255, 255, 0.68);
    --ink-4:     rgba(255, 255, 255, 0.48);
    --grid:      rgba(255, 255, 255, 0.12);
    --axis:      rgba(255, 255, 255, 0.85);

    --c-claude:  #ff8a65;
    --c-chatgpt: #1ee0a4;
    --c-gemini:  #6ab7ff;
    --c-grok:    #e53e3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background:
      linear-gradient(rgba(5, 22, 45, 0.45), rgba(5, 22, 45, 0.78)),
      url('/images/underwater_bg.jpg') center center / cover no-repeat fixed,
      #051f3d;
    color: var(--ink);
    font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; cursor: pointer; }
  input  { font-family: inherit; }

  .page {
    min-height: 100vh;
    padding: 28px 32px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Homebar (shared across pages — keep identical across probe/compass/scores) */
  .homebar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 49px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    line-height: 1.5;
  }
  .homebar-brand {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .homebar-brand .dot { color: var(--ink-4); }
  .homebar-nav { display: flex; gap: 4px; }
  .homebar-nav a {
    color: var(--ink-3);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 7px;
    transition: all 0.12s;
  }
  .homebar-nav a:hover { color: var(--ink); background: var(--surface-2); }
  .homebar-nav a.active {
    color: var(--ink);
    background: var(--surface-2);
    font-weight: 500;
  }

  /* Thinker dropdown */
  .controls {
    width: 100%;
    max-width: 760px;
    margin-bottom: 14px;
    position: relative;
  }
  .ctl-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .t-trigger {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: left;
    font-size: 13.5px;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.12s;
    font-weight: 450;
  }
  .t-trigger:hover { border-color: var(--ink-3); }
  .t-trigger.open { border-color: var(--ink); }
  .t-trigger .placeholder { color: var(--ink-4); }
  .t-trigger .label-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .t-trigger .trigger-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .t-trigger .chev {
    color: var(--ink-3);
    flex-shrink: 0;
    transition: transform 0.18s ease;
  }
  .t-trigger.open .chev { transform: rotate(180deg); }

  .t-popover {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
    z-index: 60;
    display: none;
    max-height: 380px;
    overflow-y: auto;
    animation: popIn 0.14s ease;
  }
  .t-popover.open { display: block; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: none; }
  }
  .t-popover::-webkit-scrollbar { width: 6px; }
  .t-popover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

  .t-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    border-top: 1px solid var(--border);
    transition: background 0.08s;
  }
  .t-row:first-child { border-top: none; }
  .t-row:hover { background: var(--surface-2); }
  .t-row.selected { background: #f4f4f5; }
  .t-row .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .t-row .placeholder-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px dashed var(--border-2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
  }
  .t-row .name {
    flex: 1;
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 450;
  }
  .t-row .pos {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    letter-spacing: 0.02em;
  }

  /* View toggle */
  .view-toggle {
    width: 100%;
    max-width: 760px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 18px;
  }
  .view-opt {
    background: transparent;
    border: none;
    padding: 9px 4px;
    font-size: 13px;
    color: var(--ink-2);
    font-weight: 450;
    border-radius: 7px;
    transition: all 0.15s ease;
    letter-spacing: -0.005em;
  }
  .view-opt:hover { color: var(--ink); background: var(--surface-2); }
  .view-opt.active { background: #062a4a; color: #fff; font-weight: 500; box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset; }
  .view-opt[data-view="claude"].active  { background: var(--c-claude); color: #1a0a05; }
  .view-opt[data-view="chatgpt"].active { background: var(--c-chatgpt); color: #04231a; }
  .view-opt[data-view="gemini"].active  { background: var(--c-gemini); color: #061a3a; }
  .view-opt[data-view="grok"].active    { background: var(--c-grok); color: #fff; }

  /* Compass card */
  .compass-card {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .compass {
    width: 100%;
    height: auto;
    display: block;
  }

  /* SVG */
  .gridline { stroke: var(--grid); stroke-width: 1; shape-rendering: crispEdges; }
  .axis { stroke: var(--axis); stroke-width: 1.25; shape-rendering: crispEdges; }
  .axis-label {
    font-family: "Geist Mono", monospace;
    font-size: 9.5px;
    fill: var(--ink-3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .quad-label {
    font-family: "Geist Mono", monospace;
    font-size: 8.5px;
    fill: var(--ink-4);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* Thinker avatar groups */
  .thinker-group {
    transition: transform 0.75s cubic-bezier(0.4, 0.1, 0.2, 1);
    transform-box: fill-box;
    cursor: default;
  }
  .thinker-ring {
    fill: none;
    stroke: var(--ink-3);
    stroke-width: 1.5;
    vector-effect: non-scaling-stroke;
    transition: stroke 0.2s, stroke-width 0.2s;
  }
  .thinker-group.target .thinker-ring {
    stroke: var(--ink);
    stroke-width: 2.5;
  }
  .thinker-label {
    font-family: "Geist", sans-serif;
    font-size: 11px;
    fill: var(--ink-2);
    font-weight: 500;
    pointer-events: none;
    text-anchor: middle;
  }
  .thinker-group.target .thinker-label {
    fill: var(--ink);
    font-weight: 600;
  }

  /* Model groups */
  .model-group {
    transition: opacity 0.4s ease;
  }
  .model-group.no-signal { opacity: 0.65; }
  /* .hidden defined last so it wins over .no-signal at equal specificity. */
  .model-group.hidden { opacity: 0; pointer-events: none; }
  .model-point {
    pointer-events: none;
  }
  .model-ellipse {
    fill: none;
    stroke-width: 2;
    vector-effect: non-scaling-stroke;
    pointer-events: none;
    display: none;
  }
  .model-group.show-ellipse .model-ellipse { display: inline; }
  .model-dot-fallback-outer { fill: none; stroke-width: 1.5; }
  .model-label {
    font-family: "Geist", sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    /* fill is set per-label via inline attribute (model color, dimmed when no signal). */
    paint-order: stroke fill;
    stroke: rgba(2, 14, 30, 0.85);
    stroke-width: 3px;
    stroke-linejoin: round;
    pointer-events: none;
    letter-spacing: -0.01em;
    /* text-anchor set per-label via inline attribute (see MODEL_LABEL_OFFSET). */
  }

  /* Bottom card: legend / scores */
  .info-card {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }
  .info-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 18px;
  }
  .info-row.scores { gap: 12px; }
  .info-eyebrow {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-3);
  }
  .info-target {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    padding-right: 12px;
    margin-right: 6px;
    border-right: 1px solid var(--border-2);
  }
  .info-target img {
    width: 22px; height: 22px;
    border-radius: 50%;
    object-fit: cover;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 450;
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
  }
  .score-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--ink);
    padding: 5px 10px;
    background: var(--surface-2);
    border-radius: 999px;
    font-weight: 500;
  }
  .score-pill .mdot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .score-pill .score-num {
    font-family: "Geist Mono", monospace;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .score-pill .score-num.dim { color: var(--ink-4); }

  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<nav class="homebar">
  <div class="homebar-brand">Finding Nemo</div>
  <div class="homebar-nav">
    <a href="/">Probe</a>
    <a href="/compass/" class="active">Compass</a>
    <a href="/scores/">Scores</a>
  </div>
</nav>

<div class="page">

  <div class="view-toggle" id="viewToggle">
    <button class="view-opt active" data-view="all">All</button>
    <button class="view-opt" data-view="claude">Claude</button>
    <button class="view-opt" data-view="chatgpt">ChatGPT</button>
    <button class="view-opt" data-view="gemini">Gemini</button>
    <button class="view-opt" data-view="grok">Grok</button>
  </div>

  <div class="compass-card">
    <svg class="compass" viewBox="0 0 640 640" id="compass"></svg>
  </div>

  <div class="info-card" id="infoCard"></div>

</div>

<script>
  // ============ DATA (loaded from /api/* — see init below) ============
  let THINKERS = [];
  let MODELS = [];

  // Brand colors are presentation, not data — kept in the page.
  const MODEL_COLOR = {
    claude:  '#ff8a65',
    chatgpt: '#1ee0a4',
    gemini:  '#6ab7ff',
    grok:    '#e53e3e',
  };

  // Pixel offset from each model's ellipse center to its label, with text
  // anchor. Spreads labels into the 4 quadrants so they don't stack when
  // ellipses overlap (the typical case — all four models cluster near 0,0).
  const MODEL_LABEL_OFFSET = {
    grok:    { dx:  40, dy: -22, anchor: 'start' },
    claude:  { dx:  40, dy:  30, anchor: 'start' },
    gemini:  { dx: -40, dy: -22, anchor: 'end'   },
    chatgpt: { dx: -40, dy:  30, anchor: 'end'   },
  };

  // ============ STATE ============
  const state = {
    modelView: 'all',     // 'all' | 'claude' | 'chatgpt' | 'gemini' | 'grok'
  };

  // ============ COMPASS GEOMETRY ============
  const CX = 320, CY = 320, UNIT = 28;
  const svgX = x => CX + x * UNIT;
  const svgY = y => CY - y * UNIT;

  // ============ RENDER COMPASS ============
  function renderCompass() {
    const svg = document.getElementById('compass');
    const parts = [];

    // <defs> with a circular clipPath for avatars.
    parts.push(`
      <defs>
        <clipPath id="avatarClip"><circle cx="0" cy="0" r="20"/></clipPath>
      </defs>`);

    // Gridlines every 2 units.
    for (let v = -10; v <= 10; v += 2) {
      if (v === 0) continue;
      parts.push(`<line class="gridline" x1="${svgX(v)}" y1="${svgY(-10)}" x2="${svgX(v)}" y2="${svgY(10)}"/>`);
      parts.push(`<line class="gridline" x1="${svgX(-10)}" y1="${svgY(v)}" x2="${svgX(10)}" y2="${svgY(v)}"/>`);
    }
    parts.push(`<rect class="gridline" x="${svgX(-10)}" y="${svgY(10)}" width="${20*UNIT}" height="${20*UNIT}" fill="none"/>`);

    // Axes.
    parts.push(`<line class="axis" x1="${svgX(-10)}" y1="${svgY(0)}" x2="${svgX(10)}" y2="${svgY(0)}"/>`);
    parts.push(`<line class="axis" x1="${svgX(0)}" y1="${svgY(-10)}" x2="${svgX(0)}" y2="${svgY(10)}"/>`);

    // Axis labels.
    parts.push(`<text class="axis-label" x="${svgX(-10) + 4}" y="${svgY(0) - 6}">Left</text>`);
    parts.push(`<text class="axis-label" x="${svgX(10) - 4}" y="${svgY(0) - 6}" text-anchor="end">Right</text>`);
    parts.push(`<text class="axis-label" x="${svgX(0) + 6}" y="${svgY(10) + 12}">Authoritarian</text>`);
    parts.push(`<text class="axis-label" x="${svgX(0) + 6}" y="${svgY(-10) - 4}">Libertarian</text>`);

    // Quadrant labels.
    parts.push(`<text class="quad-label" x="${svgX(-9.5)}" y="${svgY(9.2)}">Auth ◂ Left</text>`);
    parts.push(`<text class="quad-label" x="${svgX(9.5)}"  y="${svgY(9.2)}" text-anchor="end">Auth ▸ Right</text>`);
    parts.push(`<text class="quad-label" x="${svgX(-9.5)}" y="${svgY(-9.4)}">Lib ◂ Left</text>`);
    parts.push(`<text class="quad-label" x="${svgX(9.5)}"  y="${svgY(-9.4)}" text-anchor="end">Lib ▸ Right</text>`);

    // Thinker avatars (display position = true position + display nudge).
    THINKERS.forEach(t => {
      const cx = svgX(t.compass_x + (t.disp_dx || 0));
      const cy = svgY(t.compass_y + (t.disp_dy || 0));
      const ly = t.label_dy ?? 36;
      parts.push(`
        <g class="thinker-group" id="thinker-${t.id}" style="transform: translate(${cx}px, ${cy}px) scale(1);">
          <image href="${t.image}" x="-20" y="-20" width="40" height="40" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
          <circle class="thinker-ring" r="20"/>
          <text class="thinker-label" y="${ly}">${t.name}</text>
        </g>`);
    });

    // Models: per-question scatter cloud + 1σ covariance ellipse + label.
    // No center dot — the cloud and its ellipse ARE the placement (matches
    // plot_compass.py). When a model has no cloud (has_signal=false), fall
    // back to a grayed marker at (econ_x, social_y) so it stays visible.
    MODELS.forEach(m => {
      const dim = !m.has_signal;
      const color = dim ? 'rgba(180,180,180,0.85)' : m.color;
      const tooltip = dim
        ? `<title>${m.name}: no ideological signal — answered neutrally on every probe question.</title>`
        : '';

      const inner = [];

      if (m.points && m.points.length) {
        m.points.forEach(p => {
          inner.push(
            `<circle class="model-point" cx="${svgX(p[0])}" cy="${svgY(p[1])}" r="3" fill="${color}"/>`
          );
        });
      }

      let labelX = svgX(m.econ_x), labelY = svgY(m.social_y);
      if (m.ellipse) {
        const cx = svgX(m.ellipse.cx);
        const cy = svgY(m.ellipse.cy);
        const rx = m.ellipse.rx * UNIT;
        const ry = m.ellipse.ry * UNIT;
        // angle_deg is in compass space (y up); SVG y is flipped, so negate.
        const angle = -m.ellipse.angle_deg;
        inner.push(
          `<ellipse class="model-ellipse" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" transform="rotate(${angle} ${cx} ${cy})" stroke="${color}"/>`
        );
        labelX = cx;
        labelY = cy;
      } else if (!m.points || m.points.length === 0) {
        inner.push(
          `<circle class="model-dot-fallback-outer" cx="${labelX}" cy="${labelY}" r="9" stroke="${color}"/>`,
          `<circle cx="${labelX}" cy="${labelY}" r="5.5" fill="${color}"/>`
        );
      }

      const off = MODEL_LABEL_OFFSET[m.id] || { dx: 0, dy: -14, anchor: 'middle' };
      inner.push(
        `<text class="model-label" x="${labelX + off.dx}" y="${labelY + off.dy}" text-anchor="${off.anchor}" fill="${color}">${m.name}${dim ? ' *' : ''}</text>`
      );

      parts.push(`
        <g class="model-group ${dim ? 'no-signal' : ''}" id="model-${m.id}">
          ${tooltip}
          ${inner.join('')}
        </g>`);
    });

    svg.innerHTML = parts.join('');
  }

  // Toggle model visibility + scale thinkers by distance to the focused model.
  function updateView() {
    MODELS.forEach(m => {
      const g = document.getElementById('model-' + m.id);
      if (!g) return;
      const show = (state.modelView === 'all' || state.modelView === m.id);
      g.classList.toggle('hidden', !show);
      // Ellipses are only shown when a single model is focused.
      g.classList.toggle('show-ellipse', state.modelView === m.id);
    });

    THINKERS.forEach(t => {
      const g = document.getElementById('thinker-' + t.id);
      if (!g) return;
      const cx = svgX(t.compass_x + (t.disp_dx || 0));
      const cy = svgY(t.compass_y + (t.disp_dy || 0));
      let scale = 1.0;

      if (state.modelView !== 'all') {
        const m = MODELS.find(x => x.id === state.modelView);
        if (m) {
          const dist = Math.hypot(t.compass_x - m.econ_x, t.compass_y - m.social_y);
          const k = Math.min(1, dist / 18);
          scale = 1.3 - k * 0.6; // 1.3 → 0.7
        }
      }
      g.style.transform = `translate(${cx}px, ${cy}px) scale(${scale.toFixed(3)})`;
    });

    renderInfoCard();
  }

  // ============ INFO CARD (legend) ============
  function renderInfoCard() {
    const card = document.getElementById('infoCard');
    const items = MODELS.map(m => {
      const dotColor = m.has_signal ? m.color : 'rgba(180,180,180,0.65)';
      const note = m.has_signal ? '' : ' <span style="color:var(--ink-4);font-size:11px">(no signal)</span>';
      return `<span class="legend-item">
                <span class="legend-dot" style="background:${dotColor}"></span>${m.name}${note}
              </span>`;
    }).join('');
    card.innerHTML = `
      <div class="info-row">
        <span class="info-eyebrow">Legend</span>
        ${items}
      </div>`;
  }

  // ============ VIEW TOGGLE ============
  document.getElementById('viewToggle').addEventListener('click', e => {
    const btn = e.target.closest('.view-opt');
    if (!btn) return;
    document.querySelectorAll('#viewToggle .view-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.modelView = btn.dataset.view;
    updateView();
  });

  // ============ INIT ============
  async function init() {
    const [thinkers, models] = await Promise.all([
      fetch('/api/thinkers').then(r => r.json()),
      fetch('/api/models').then(r => r.json()),
    ]);
    THINKERS = thinkers;
    MODELS = models.map(m => ({ ...m, color: MODEL_COLOR[m.id] || '#888' }));
    renderCompass();
    updateView();
  }
  init().catch(err => {
    console.error('Failed to load compass data:', err);
    document.getElementById('infoCard').innerHTML =
      `<span style="color:#ff9b8a">Failed to load data: ${err.message}</span>`;
  });
</script>
