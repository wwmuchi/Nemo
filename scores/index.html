<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nemo · scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300..700&family=Geist:wght@100..900&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg:        transparent;
    --surface:   rgba(255, 255, 255, 0.06);
    --surface-2: rgba(255, 255, 255, 0.10);
    --border:    rgba(255, 255, 255, 0.18);
    --border-2:  rgba(255, 255, 255, 0.32);
    --ink:       #ffffff;
    --ink-2:     rgba(255, 255, 255, 0.88);
    --ink-3:     rgba(255, 255, 255, 0.68);
    --ink-4:     rgba(255, 255, 255, 0.48);
    --c-claude:  #ff8a65;
    --c-chatgpt: #1ee0a4;
    --c-gemini:  #6ab7ff;
    --c-grok:    #f5f5f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background:
      linear-gradient(rgba(5, 22, 45, 0.45), rgba(5, 22, 45, 0.78)),
      url('/images/underwater_bg.jpg') center center / cover no-repeat fixed,
      #051f3d;
    color: var(--ink);
    font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; cursor: pointer; }
  img { display: block; }

  /* Homebar (shared across pages — keep identical across probe/compass/scores) */
  .homebar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 49px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    line-height: 1.5;
  }
  .homebar-brand {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .homebar-brand .dot { color: var(--ink-4); }
  .homebar-nav { display: flex; gap: 4px; }
  .homebar-nav a {
    color: var(--ink-3);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 7px;
    transition: all 0.12s;
  }
  .homebar-nav a:hover { color: var(--ink); background: var(--surface-2); }
  .homebar-nav a.active {
    color: var(--ink);
    background: var(--surface-2);
    font-weight: 500;
  }

  /* Page */
  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 28px 60px;
  }

  .page-head {
    margin-bottom: 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .page-sub {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 280px 1fr;
    padding: 0 18px;
    margin-bottom: 6px;
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .col-headers .right {
    display: grid;
    grid-template-columns: 80px 1fr 40px;
    align-items: center;
    column-gap: 14px;
  }

  /* Rows */
  .row {
    display: grid;
    grid-template-columns: 280px 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 10px;
    align-items: center;
    gap: 14px;
    animation: rowIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .row-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .row-avatar {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border-2);
    flex-shrink: 0;
  }
  .row-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .row-pos {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  .row-right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bar {
    display: grid;
    grid-template-columns: 80px 1fr 40px;
    align-items: center;
    column-gap: 14px;
  }
  .bar-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    letter-spacing: -0.005em;
  }
  .bar-track {
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    position: absolute;
    inset: 0 100% 0 0;
    border-radius: 999px;
    transition: right 1.1s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .bar-score {
    font-family: "Geist Mono", monospace;
    font-feature-settings: "tnum";
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    text-align: right;
    letter-spacing: -0.02em;
  }
  .bar-score .denom {
    color: var(--ink-4);
    font-weight: 400;
    margin-left: 1px;
  }
  .bar.best .bar-score { color: var(--ink); }
  .bar.best .bar-label::after {
    content: "★";
    color: var(--ink-3);
    margin-left: 6px;
    font-size: 10px;
  }
</style>
</head>
<body>

<nav class="homebar">
  <div class="homebar-brand">Finding Nemo</div>
  <div class="homebar-nav">
    <a href="/">Probe</a>
    <a href="/compass/">Compass</a>
    <a href="/scores/" class="active">Scores</a>
  </div>
</nav>

<div class="page">
  <div class="page-head">
    <div class="page-title">Emulation scores</div>
    <div class="page-sub">8 figures · 4 models · /10</div>
  </div>

  <div class="col-headers">
    <div>Figure</div>
    <div class="right">
      <span>Model</span>
      <span></span>
      <span style="text-align:right">Score</span>
    </div>
  </div>

  <div id="grid"></div>
</div>

<script>
  const THINKERS = [
    { id: 'kim',      name: 'Kim Jong Un',              x: -9.5, y:  9.5, img: '/images/kim.jpg' },
    { id: 'putin',    name: 'Vladimir Putin',           x: -3.5, y:  9.0, img: '/images/putin.jpg' },
    { id: 'trump',    name: 'Donald Trump',             x:  9.0, y:  9.0, img: '/images/trump.jpg' },
    { id: 'macron',   name: 'Emmanuel Macron',          x:  7.0, y:  4.5, img: '/images/macron.jpg' },
    { id: 'milei',    name: 'Javier Milei',             x: 10.0, y: -3.0, img: '/images/milei.jpg' },
    { id: 'friedman', name: 'Milton Friedman',          x:  3.0, y: -8.0, img: '/images/friedman.jpg' },
    { id: 'mamdani',  name: 'Zohran Mamdani',           x: -3.5, y: -3.5, img: '/images/mamdani.jpg' },
    { id: 'aoc',      name: 'Alexandria Ocasio-Cortez', x: -4.0, y: -3.5, img: '/images/aoc.jpg' },
  ];

  const MODELS = [
    { id: 'claude',  name: 'Claude',  color: 'var(--c-claude)' },
    { id: 'chatgpt', name: 'ChatGPT', color: 'var(--c-chatgpt)' },
    { id: 'gemini',  name: 'Gemini',  color: 'var(--c-gemini)' },
    { id: 'grok',    name: 'Grok',    color: 'var(--c-grok)' },
  ];

  // Same FNV-1a hash & emulationSkill as the compass page so scores match across views.
  function hash(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return Math.abs(h);
  }
  function emulationSkill(modelId, thinkerId) {
    return (hash(modelId + ':' + thinkerId) % 10) + 1;
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = THINKERS.map((t, i) => {
      const scores = MODELS.map(m => ({ m, score: emulationSkill(m.id, t.id) }));
      const best = Math.max(...scores.map(s => s.score));
      const bars = scores.map(({ m, score }) => `
        <div class="bar ${score === best ? 'best' : ''}">
          <div class="bar-label">${m.name}</div>
          <div class="bar-track">
            <div class="bar-fill" data-target="${score * 10}" style="background:${m.color}; right:100%"></div>
          </div>
          <div class="bar-score">${score}<span class="denom">/10</span></div>
        </div>`).join('');
      return `
        <div class="row" style="animation-delay:${i * 0.06}s">
          <div class="row-left">
            <img class="row-avatar" src="${t.img}" alt=""/>
            <div>
              <div class="row-name">${t.name}</div>
              <div class="row-pos">(${t.x.toFixed(1)}, ${t.y.toFixed(1)})</div>
            </div>
          </div>
          <div class="row-right">${bars}</div>
        </div>`;
    }).join('');

    // Animate bar fills after layout settles.
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        const pct = Number(el.dataset.target);
        el.style.right = `${100 - pct}%`;
      });
    });
  }

  render();
</script>
</body>
</html>
