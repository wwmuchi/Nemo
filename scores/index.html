<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nemo · scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300..700&family=Geist:wght@100..900&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg:        transparent;
    --surface:   rgba(255, 255, 255, 0.06);
    --surface-2: rgba(255, 255, 255, 0.10);
    --border:    rgba(255, 255, 255, 0.18);
    --border-2:  rgba(255, 255, 255, 0.32);
    --ink:       #ffffff;
    --ink-2:     rgba(255, 255, 255, 0.88);
    --ink-3:     rgba(255, 255, 255, 0.68);
    --ink-4:     rgba(255, 255, 255, 0.48);
    --c-claude:  #ff8a65;
    --c-chatgpt: #1ee0a4;
    --c-gemini:  #6ab7ff;
    --c-grok:    #f5f5f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background:
      linear-gradient(rgba(5, 22, 45, 0.45), rgba(5, 22, 45, 0.78)),
      url('/images/underwater_bg.jpg') center center / cover no-repeat fixed,
      #051f3d;
    color: var(--ink);
    font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; cursor: pointer; }
  img { display: block; }

  /* Homebar (shared across pages — keep identical across probe/compass/scores) */
  .homebar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 49px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    line-height: 1.5;
  }
  .homebar-brand {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .homebar-brand .dot { color: var(--ink-4); }
  .homebar-nav { display: flex; gap: 4px; }
  .homebar-nav a {
    color: var(--ink-3);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 7px;
    transition: all 0.12s;
  }
  .homebar-nav a:hover { color: var(--ink); background: var(--surface-2); }
  .homebar-nav a.active {
    color: var(--ink);
    background: var(--surface-2);
    font-weight: 500;
  }

  /* Page */
  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 28px 60px;
  }

  .page-head {
    margin-bottom: 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .page-sub {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 280px 1fr;
    padding: 0 18px;
    margin-bottom: 6px;
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .col-headers .right {
    display: grid;
    grid-template-columns: 80px 1fr 40px;
    align-items: center;
    column-gap: 14px;
  }

  /* Rows */
  .row {
    display: grid;
    grid-template-columns: 280px 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 10px;
    align-items: center;
    gap: 14px;
    animation: rowIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .row-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .row-avatar {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border-2);
    flex-shrink: 0;
  }
  .row-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .row-pos {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  .row-right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bar {
    display: grid;
    grid-template-columns: 80px 1fr 40px;
    align-items: center;
    column-gap: 14px;
  }
  .bar-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    letter-spacing: -0.005em;
  }
  .bar-track {
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    position: absolute;
    inset: 0 100% 0 0;
    border-radius: 999px;
    transition: right 1.1s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .bar-score {
    font-family: "Geist Mono", monospace;
    font-feature-settings: "tnum";
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    text-align: right;
    letter-spacing: -0.02em;
  }
  .bar-score .denom {
    color: var(--ink-4);
    font-weight: 400;
    margin-left: 1px;
  }
  .bar.best .bar-score { color: var(--ink); }
  .bar.best .bar-label::after {
    content: "★";
    color: var(--ink-3);
    margin-left: 6px;
    font-size: 10px;
  }
</style>
</head>
<body>

<nav class="homebar">
  <div class="homebar-brand">Finding Nemo</div>
  <div class="homebar-nav">
    <a href="/">Probe</a>
    <a href="/compass/">Compass</a>
    <a href="/scores/" class="active">Scores</a>
  </div>
</nav>

<div class="page">
  <div class="page-head">
    <div class="page-title">Model alignment scores</div>
    <div class="page-sub">8 figures · 4 models · mean /10</div>
  </div>

  <div class="col-headers">
    <div>Figure</div>
    <div class="right">
      <span>Model</span>
      <span></span>
      <span style="text-align:right">Score</span>
    </div>
  </div>

  <div id="grid"></div>
</div>

<script>
  // CSS-variable colors keyed by model id. Presentation only — not data.
  const MODEL_COLOR = {
    claude:  'var(--c-claude)',
    chatgpt: 'var(--c-chatgpt)',
    gemini:  'var(--c-gemini)',
    grok:    'var(--c-grok)',
  };
  const NO_SIGNAL_COLOR = 'rgba(180, 180, 180, 0.55)';

  function render(thinkers, models) {
    const grid = document.getElementById('grid');
    grid.innerHTML = thinkers.map((t, i) => {
      // (model, score-or-null) pairs in the listed model order.
      const scored = models.map(m => ({
        m,
        score: m.has_signal ? m.scores[t.id] : null,
      }));
      const realScores = scored.filter(s => s.score != null).map(s => s.score);
      const best = realScores.length ? Math.max(...realScores) : null;

      const bars = scored.map(({ m, score }) => {
        if (score == null) {
          return `
            <div class="bar" title="${m.name} answered neutrally on every probe question.">
              <div class="bar-label" style="color:var(--ink-4)">${m.name}</div>
              <div class="bar-track">
                <div class="bar-fill" data-target="50" style="background:${NO_SIGNAL_COLOR}; right:100%"></div>
              </div>
              <div class="bar-score" style="color:var(--ink-4)">— <span class="denom">no signal</span></div>
            </div>`;
        }
        const isBest = (score === best);
        const pct = score * 10; // 1–10 → 10–100
        return `
          <div class="bar ${isBest ? 'best' : ''}">
            <div class="bar-label">${m.name}</div>
            <div class="bar-track">
              <div class="bar-fill" data-target="${pct}" style="background:${MODEL_COLOR[m.id] || '#888'}; right:100%"></div>
            </div>
            <div class="bar-score">${score.toFixed(2)}<span class="denom">/10</span></div>
          </div>`;
      }).join('');

      return `
        <div class="row" style="animation-delay:${i * 0.06}s">
          <div class="row-left">
            <img class="row-avatar" src="${t.image}" alt=""/>
            <div>
              <div class="row-name">${t.name}</div>
              <div class="row-pos">(${t.compass_x.toFixed(1)}, ${t.compass_y.toFixed(1)})</div>
            </div>
          </div>
          <div class="row-right">${bars}</div>
        </div>`;
    }).join('');

    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        const pct = Number(el.dataset.target);
        el.style.right = `${100 - pct}%`;
      });
    });
  }

  async function init() {
    const [thinkers, models] = await Promise.all([
      fetch('/api/thinkers').then(r => r.json()),
      fetch('/api/models').then(r => r.json()),
    ]);
    render(thinkers, models);
  }
  init().catch(err => {
    console.error('Failed to load scores data:', err);
    document.getElementById('grid').innerHTML =
      `<div style="color:#ff9b8a;padding:18px">Failed to load data: ${err.message}</div>`;
  });
</script>
</body>
</html>
